name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyA8_8FiiUQlnQtUiaYh5xFee7U_q_hB92M"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "safestay-d7080.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "safestay-d7080"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "safestay-d7080.firebasestorage.app"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "567119165161"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:567119165161:web:5b7570d59769db9979a278"
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: "G-DCJ5LFN3MZ"

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4